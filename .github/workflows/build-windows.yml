name: Build Windows Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build executable with PyInstaller
      run: |
        python -m PyInstaller --noconfirm --clean --onefile --windowed --name TallerMecanico --add-data "database_schema.sql;." main.py
    
    - name: Create portable package
      shell: cmd
      run: |
        if not exist dist\portable mkdir dist\portable
        if not exist dist\portable\TallerMecanicoPortable mkdir dist\portable\TallerMecanicoPortable
        if not exist dist\portable\TallerMecanicoPortable\data mkdir dist\portable\TallerMecanicoPortable\data
        copy dist\TallerMecanico.exe dist\portable\TallerMecanicoPortable\
        (
        echo @echo off
        echo setlocal
        echo set "TM_DATA_DIR=%%~dp0data"
        echo start "" "%%~dp0TallerMecanico.exe"
        ) > dist\portable\TallerMecanicoPortable\ABRIR_TALLER.bat
        (
        echo TallerMecanico - USB Portable
        echo.
        echo 1^) Doble clic en ABRIR_TALLER.bat
        echo 2^) Trabaje normalmente en la aplicacion
        echo 3^) El sistema guarda y respalda automaticamente
        ) > dist\portable\TallerMecanicoPortable\LEEME_PORTABLE.txt
    
    - name: Upload standalone executable
      uses: actions/upload-artifact@v4
      with:
        name: TallerMecanico-Standalone
        path: dist/TallerMecanico.exe
        retention-days: 30
    
    - name: Upload portable package
      uses: actions/upload-artifact@v4
      with:
        name: TallerMecanico-Portable
        path: dist/portable/TallerMecanicoPortable/
        retention-days: 30
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/TallerMecanico.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
